<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penrose Particles</title>
</head>

<style />
.cards {
display: flex;
justify-content: center;
align-items: center;
gap: 80px;

margin-top: 80px;
}

.card {
display: block;
width: 500px;

transition: all .3s ease;
}

.card img {
width: 100%;
display: block;

border-radius: 12px;
}

.card:hover {
transform: translateY(-10px) scale(1.03);
}

.card:hover img {
filter: drop-shadow(0 0 25px #3449ff)
drop-shadow(0 0 40px #a93ad9);
}
</style>

<body>
    <div class="stars"></div>

    <main class="page">
        <h1></h1>

        <div class="cards">

            <a href="insights.html" class="card">
                <img src="images/insights.jpeg" alt="Insights">
            </a>

            <a href="portfolio.html" class="card">
                <img src="images/visuals.jpeg" alt="Visuals">
            </a>

        </div>


    </main>
</body>

</html>
