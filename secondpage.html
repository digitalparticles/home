<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penrose Particles</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #06105f 0%, #020438 45%, #000018 100%);
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(#ffffff 1px, transparent 1px),
                radial-gradient(#3449ff 1px, transparent 1px);
            background-size: 140px 140px, 220px 220px;
            opacity: 0.35;
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 45px;
        }

        h1 {
            margin: 0;
            font-size: clamp(38px, 6vw, 84px);
            letter-spacing: 10px;
            color: #3449ff;
            text-shadow: 0 0 18px #3449ff;
        }

        .quote {
            position: absolute;
            left: 40px;
            bottom: 35px;
            color: #5a7cff;
            letter-spacing: 4px;
            font-size: 13px;
            line-height: 1.8;
            text-transform: uppercase;
        }

        .cards {
            display: flex;
            gap: 80px;
        }

        .card {
            width: 360px;
            height: 480px;
            border: 1px solid #3449ff;
            border-radius: 12px;
            background: rgba(2, 4, 56, 0.55);
            box-shadow: 0 0 25px rgba(52, 73, 255, 0.35);
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s ease;
        }

        .card img {
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 45px rgba(169, 58, 217, 0.55);
            border-color: #a93ad9;
        }

        .visual {
            width: 220px;
            height: 220px;
            margin-bottom: 55px;
            position: relative;
        }

        h2 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 12px;
            font-weight: 300;
        }

        .subtitle {
            margin-top: 18px;
            color: #5a7cff;
            letter-spacing: 4px;
            font-size: 13px;
            text-transform: uppercase;
        }

        .arrow {
            margin-top: 35px;
            color: #a93ad9;
            font-size: 34px;
        }

        @media (max-width: 850px) {
            body {
                overflow: auto;
            }

            .cards {
                flex-direction: column;
                gap: 30px;
            }

            .card {
                width: 80vw;
                height: 420px;
            }

            .quote {
                position: static;
                text-align: center;
                margin-bottom: 25px;
            }
        }
    </style>
</head>

<body>
    <div class="stars"></div>

    <main class="page">


        <section class="cards">
            <a class="card" href="insights.html">
                <!-- <div class="visual circle"></div> -->
                <img src="img2/insights.jpeg" alt="insights">

        </section>
