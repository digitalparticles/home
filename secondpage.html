<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penrose Particles</title>

    <style>
        .cards {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 50px;
        }

        .card {
            display: block;
            width: 450px;
            transition: 0.3s ease;
        }

        .card img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #3449ff;
            box-shadow: 0 0 20px rgba(52, 73, 255, .3);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
        }

        .card:hover img {
            box-shadow: 0 0 40px rgba(169, 58, 217, .6);
        }
    </style>
</head>

<body>
    <div class="stars"></div>

    <main class="page">
        <h1></h1>

        <div class="cards">

            <a href="insights.html" class="card">
                <img src="images/insights.jpeg" alt="Insights">
            </a>

            <a href="visuals.html" class="card">
                <img src="images/visuals.jpeg" alt="Visuals">
            </a>

        </div>


    </main>
</body>

</html>
