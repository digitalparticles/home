<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Graph</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            padding: 40px 0;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f4f2;
            color: #1f2933;
            font-family: Arial, Helvetica, sans-serif;
        }

        main {
            width: 100%;
            max-width: 920px;
            text-align: center;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 2rem;
            font-weight: 700;
        }

        img {
            width: 100%;
            max-width: 920px;
            border-radius: 8px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
        }

        .home-button {
            display: inline-block;
            margin-top: 22px;
            padding: 12px 22px;
            border-radius: 8px;
            background: #1f2933;
            color: #fff;
            font-weight: 700;
            text-decoration: none;
        }

        .home-button:hover {
            background: #344454;
        }
    </style>
</head>

<body>

    <div class="pop-tile-study">
        <h2>Adult Population Relative to Young Population, 2025</h2>
        <p class="subtitle">Darker red = more adults per young person</p>
        <div class="tile-map" id="populationTileMap"></div>
        <p class="footer"><strong>Ratio = 18+ population divided by young population.</strong></p>
        <p class="note">Note: the workbook has 18+ population, not a separate elderly population column.</p>

        <a class="home-button" href="index.html">Home</a>
        <a class="home-button" href="insights.html">Back to Studies</a>

    </div>

    <style>
        .pop-tile-study {
            font-family: Arial, Helvetica, sans-serif;
            color: #111827;
            background: #fff;
            max-width: 980px;
        }

        .pop-tile-study h2 {
            margin: 0;
            font-size: 28px;
            line-height: 1.15;
        }

        .pop-tile-study .subtitle {
            margin: 4px 0 34px;
            color: #666;
            font-size: 16px;
        }

        .pop-tile-study .tile-map {
            position: relative;
            width: 908px;
            height: 590px;
        }

        .pop-tile-study .tile {
            position: absolute;
            display: grid;
            place-items: center;
            width: 66px;
            height: 66px;
            border: 2px solid #d8d8d8;
            border-radius: 7px;
            box-sizing: border-box;
            color: #111827;
            font-size: 20px;
            font-weight: 700;
        }

        .pop-tile-study .footer {
            margin: 12px 0 0;
            font-size: 17px;
        }

        .pop-tile-study .note {
            margin: 6px 0 0;
            color: #666;
            font-size: 16px;
        }

        .button-row {
            display: flex;
            justify-content: center;
            margin-top: 40px;
            padding-bottom: 30px;
        }

        .home-button {
            display: inline-block;

            padding: 12px 22px;
            border-radius: 8px;
            background: #1f2933;
            color: #fff;
            font-weight: 700;
            text-decoration: none;
        }

        .home-button:hover {
            background: #344454;
        }


        @media (max-width: 760px) {
            body {
                min-height: auto;
                padding: 20px 12px;
                align-items: flex-start;
            }

            .pop-tile-study {
                width: 100%;
                max-width: 100%;
                padding: 20px 14px 24px;
                box-sizing: border-box;
                overflow: hidden;
            }

            .pop-tile-study h2 {
                font-size: 22px;
                line-height: 1.2;
            }

            .pop-tile-study .subtitle {
                margin-bottom: 18px;
                font-size: 14px;
            }

            .pop-tile-study .tile-map {
                width: 100%;
                height: 590px;
                overflow-x: auto;
                overflow-y: visible;
                padding-bottom: 12px;
                -webkit-overflow-scrolling: touch;
            }

            .pop-tile-study .footer,
            .pop-tile-study .note {
                font-size: 14px;
                line-height: 1.4;
            }

            .home-button {
                display: block;
                width: 100%;
                max-width: 260px;
                margin: 12px auto 0;
                box-sizing: border-box;
                text-align: center;
            }
        }

        @media (max-width: 420px) {
            .pop-tile-study {
                padding: 18px 10px 22px;
            }

            .pop-tile-study h2 {
                font-size: 20px;
            }
        }
    </style>

    <script>
        const positions = {
            AK: [0, 0], ME: [0, 11],
            VT: [1, 9], NH: [1, 10],
            WA: [2, 0], ID: [2, 1], MT: [2, 2], ND: [2, 3], MN: [2, 4],
            IL: [2, 5], WI: [2, 6], MI: [2, 7], NY: [2, 8], MA: [2, 9], RI: [2, 10],
            OR: [3, 0], NV: [3, 1], WY: [3, 2], SD: [3, 3], IA: [3, 4],
            IN: [3, 5], OH: [3, 6], PA: [3, 7], NJ: [3, 8], CT: [3, 9],
            CA: [4, 0], UT: [4, 1], CO: [4, 2], NE: [4, 3], MO: [4, 4],
            KY: [4, 5], WV: [4, 6], VA: [4, 7], MD: [4, 8], DE: [4, 9],
            AZ: [5, 1], NM: [5, 2], KS: [5, 3], AR: [5, 4], TN: [5, 5], NC: [5, 6], SC: [5, 7],
            OK: [6, 3], LA: [6, 4], MS: [6, 5], AL: [6, 6], GA: [6, 7],
            HI: [7, 0], TX: [7, 3], FL: [7, 8]
        };

        const ratios = {
            AK: 2.55, ME: 3.85, VT: 3.60, NH: 3.72,
            WA: 3.15, ID: 2.55, MT: 3.15, ND: 2.82, MN: 2.75,
            IL: 3.10, WI: 3.22, MI: 3.25, NY: 3.30, MA: 3.25, RI: 3.55,
            OR: 3.35, NV: 3.08, WY: 3.05, SD: 2.75, IA: 2.85,
            IN: 2.90, OH: 3.08, PA: 3.35, NJ: 3.10, CT: 3.20,
            CA: 2.90, UT: 2.05, CO: 3.10, NE: 2.60, MO: 3.00,
            KY: 2.95, WV: 3.55, VA: 3.05, MD: 2.95, DE: 3.35,
            AZ: 3.10, NM: 3.15, KS: 2.75, AR: 2.90, TN: 3.00, NC: 3.05, SC: 3.10,
            OK: 2.72, LA: 2.85, MS: 2.90, AL: 3.05, GA: 2.85,
            HI: 3.35, TX: 2.55, FL: 3.55
        };

        const tileSize = 66;
        const gap = 10;
        const values = Object.values(ratios);
        const min = Math.min(...values);
        const max = Math.max(...values);

        function hexToRgb(hex) {
            const clean = hex.replace("#", "");
            return [
                parseInt(clean.slice(0, 2), 16),
                parseInt(clean.slice(2, 4), 16),
                parseInt(clean.slice(4, 6), 16)
            ];
        }

        function rgbToHex(rgb) {
            return "#" + rgb.map(v => v.toString(16).padStart(2, "0")).join("");
        }

        function colorForRatio(value) {
            const low = hexToRgb("#f7d7d9");
            const high = hexToRgb("#a91d28");
            const t = (value - min) / (max - min);

            return rgbToHex(low.map((channel, i) => {
                return Math.round(channel + (high[i] - channel) * t);
            }));
        }

        const map = document.getElementById("populationTileMap");

        Object.entries(positions).forEach(([state, position]) => {
            const [row, col] = position;

            const tile = document.createElement("div");
            tile.className = "tile";
            tile.textContent = state;
            tile.title = `${state}: ${ratios[state].toFixed(2)} adults per young person`;

            tile.style.left = `${col * (tileSize + gap)}px`;
            tile.style.top = `${row * (tileSize + gap)}px`;
            tile.style.backgroundColor = colorForRatio(ratios[state]);

            map.appendChild(tile);
        });
    </script>


    </main>
</body>

</html>
